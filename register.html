<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TicoAutos | Registro</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Registro</h1>

    <form id="registerForm" class="card">
      <p class="hint">Tambien puedes empezar con Google</p>
      <div id="googleRegisterBtn"></div>
      <p id="googleModeHint" class="hint" hidden></p>

      <label>
        Cedula
        <input
          type="text"
          id="cedula"
          required
          minlength="9"
          maxlength="9"
          inputmode="numeric"
          autocomplete="off"
        />
      </label>

      <button type="button" id="btnValidateCedula">Validar cedula</button>

      <label>
        Nombre
        <input type="text" id="name" required minlength="2" autocomplete="given-name" readonly />
      </label>

      <div class="grid-2">
        <label>
          Apellido paterno
          <input type="text" id="apellidoPaterno" required minlength="2" readonly />
        </label>

        <label>
          Apellido materno
          <input type="text" id="apellidoMaterno" required minlength="2" readonly />
        </label>
      </div>

      <label>
        Correo
        <input type="email" id="email" required autocomplete="email" />
      </label>

      <label>
        Contrasena
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
      </label>

      <button type="submit" id="btnRegister">Registrarme</button>

      <p id="msg" class="msg" aria-live="polite"></p>

      <p class="hint">
        Ya tienes cuenta? <a href="./login.html">Inicia sesion</a>
      </p>
    </form>
  </main>

  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="./js/register.js"></script>
</body>
</html>
